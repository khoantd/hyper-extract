[project]
name = "ontosight"
version = "0.2.0"
description = "Interactive visualization engine for knowledge graphs (Hyper-Extract vendored fork)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ontosight"]
